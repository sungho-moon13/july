<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>폰 저장공간 구조대</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="phone-frame" aria-label="핸드폰 게임 화면">
        <div class="phone-bezel">
          <div class="phone-speaker" aria-hidden="true"></div>

          <div class="phone-screen">
            <header class="app-header">
              <div>
                <p class="stage-label">실시간 정리</p>
                <h1>폰 저장공간 구조대</h1>
              </div>
              <button class="reset-button" id="resetButton" type="button">다시</button>
            </header>

            <section class="status-row" aria-label="간단 점수판">
              <span>⏱ <strong id="timeText">0초</strong></span>
              <span>★ <strong id="scoreText">0점</strong></span>
              <span>🔥 <strong id="comboText">0</strong></span>
              <span>Lv <strong id="levelText">1</strong></span>
            </section>

            <section class="phone-meter" aria-label="핸드폰 저장공간">
              <div class="meter-copy">
                <strong id="storageText">21.5GB / 32GB 사용 중</strong>
                <span id="incomingText">파일이 계속 들어옵니다.</span>
              </div>
              <div class="storage-track" aria-hidden="true">
                <div class="storage-fill" id="storageFill"></div>
              </div>
            </section>

            <section class="workspace" aria-label="실시간 정리 작업 공간">
              <div class="item-zone">
                <div class="zone-heading">
                  <h2>들어오는 파일</h2>
                  <p>카드의 배지와 같은 이름의 정리함으로 끌어 놓으세요.</p>
                </div>
                <div class="item-grid" id="itemGrid" aria-label="정리할 파일 아이템 목록"></div>
              </div>

              <div class="storage-zone" aria-label="정리함">
                <div class="drop-box keep-box" data-action="keep" aria-label="보관함">
                  <span>보관</span>
                  <strong>중요</strong>
                  <small id="keepCount">0</small>
                </div>
                <div class="drop-box backup-box" data-action="backup" aria-label="백업함">
                  <span>백업</span>
                  <strong>클라우드</strong>
                  <small id="backupCount">0</small>
                </div>
                <div class="drop-box delete-box" data-action="delete" aria-label="삭제함">
                  <span>삭제</span>
                  <strong>비움</strong>
                  <small id="deleteCount">0</small>
                </div>
              </div>
            </section>

            <section class="feedback-panel" aria-live="polite">
              <p id="message">시작 버튼을 누르면 파일이 실시간으로 들어옵니다.</p>
              <button class="start-button" id="startButton" type="button">시작</button>
            </section>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
